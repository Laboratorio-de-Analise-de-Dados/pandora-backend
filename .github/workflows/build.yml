name: 🏗️ CI Build Pandora Backend

# Roda a CADA merge na main (integração contínua): builda e publica a imagem
# como `latest` e `sha-<commit>`. Isso NÃO faz deploy — só garante que a main
# sempre tem uma imagem buildável e rastreável no Docker Hub.
#
# O deploy só acontece quando VOCÊ cria uma versão (git tag vX.Y.Z) — ver deploy.yml.
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Build da imagem
        run: |
          IMAGE_NAME=${{ secrets.DOCKER_USER }}/pandora-backend
          SHORT_SHA=$(git rev-parse --short HEAD)
          docker build \
            --build-arg SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            -t "$IMAGE_NAME:sha-$SHORT_SHA" \
            -t "$IMAGE_NAME:latest" .

      - name: Push da imagem
        run: |
          IMAGE_NAME=${{ secrets.DOCKER_USER }}/pandora-backend
          SHORT_SHA=$(git rev-parse --short HEAD)
          docker push "$IMAGE_NAME:sha-$SHORT_SHA"
          docker push "$IMAGE_NAME:latest"
