name: 🚀 Deploy Pandora Backend (Produção)

# O DEPLOY É LIBERADO PELA VERSÃO QUE VOCÊ DEFINE.
#
# Fluxo:
#   - Você cria uma versão (git tag `vX.Y.Z`) num commit da main.
#   - Isso dispara este workflow, que builda a imagem daquele commit com a
#     tag da versão, publica no Docker Hub e sobe em produção.
#   - Sem tag de versão = sem deploy. A main sozinha nunca vai pra prod.
#
# Rollback / redeploy: rode manualmente (workflow_dispatch) informando uma
# versão já existente (ex: v1.1.0).
#
# STAGING (futuro): dá pra adicionar um trigger separado — ex. tags de
# pré-release `v*-rc*` apontando pra `environment: staging` — mantendo a mesma
# mecânica de "a versão libera o deploy". Ver bloco comentado no fim.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Versão a (re)deployar em produção (tag existente, ex: v1.1.0)"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production # habilite "Required reviewers" aqui pra exigir aprovação manual
    steps:
      - name: Resolve a versão
        id: v
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${{ github.ref_name }}"      # a própria tag criada, ex: v1.2.0
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "🏷️  Versão alvo: $VERSION"

      - name: Checkout do commit da versão
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.v.outputs.version }}

      - name: Login no Docker Hub
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Build + push da imagem versionada
        run: |
          IMAGE_NAME=${{ secrets.DOCKER_USER }}/pandora-backend
          VERSION=${{ steps.v.outputs.version }}
          docker build \
            --build-arg SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            -t "$IMAGE_NAME:$VERSION" .
          docker push "$IMAGE_NAME:$VERSION"

      - name: Copia o compose pro servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/opt/pandora/backend"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          DATABASE_HOST: ${{ vars.DATABASE_HOST }}
          DATABASE_PORT: ${{ vars.DATABASE_PORT }}
          DEBUG: ${{ vars.DEBUG }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALLOWED_HOSTS: ${{ vars.ALLOWED_HOSTS }}
          EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
          EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          IMAGE_TAG: ${{ steps.v.outputs.version }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,DATABASE_HOST,DATABASE_PORT,DEBUG,SECRET_KEY,ALLOWED_HOSTS,EMAIL_HOST_USER,EMAIL_HOST_PASSWORD,DOCKER_USER,DOCKER_TOKEN,IMAGE_TAG
          script: |
            set -e
            cd /opt/pandora/backend

            echo "🌐 Garantindo a rede pandora_net..."
            docker network inspect pandora_net >/dev/null 2>&1 || docker network create pandora_net

            echo "🔑 Login no Docker Hub..."
            echo "$DOCKER_TOKEN" | docker login -u "$DOCKER_USER" --password-stdin

            echo "📥 Subindo versão: $IMAGE_TAG"
            export IMAGE_TAG
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            echo "🧹 Limpando imagens antigas..."
            docker image prune -f

            echo "✅ Deploy da versão $IMAGE_TAG concluído!"

# ─────────────────────────────────────────────────────────────────────────────
# STAGING (exemplo pra quando você tiver o ambiente):
# crie um deploy-staging.yml quase idêntico, mudando:
#   on:
#     push:
#       tags:
#         - "v*.*.*-rc*"     # tags de pré-release (ex: v1.2.0-rc.1) => staging
#   jobs:
#     deploy:
#       environment: staging  # secrets/vars próprios do staging + reviewers
# Assim: tag estável (v1.2.0) => prod; tag rc (v1.2.0-rc.1) => staging.
# ─────────────────────────────────────────────────────────────────────────────
