services:
  db:
    image: postgres:latest
    container_name: pandora_db
    environment:
      POSTGRES_DB: pandora_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret_pass
    ports:
      - 5432:5432
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pandora_net

  web:
    build:
      context: .
      args:
        SECRET_KEY: v0v8JHJuM8OzY2
    container_name: pandora_web
    environment:
      SECRET_KEY: v0v8JHJuM8OzY2
      DATABASE_NAME: pandora_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: secret_pass
      DATABASE_HOST: pandora_db
      DATABASE_PORT: 5432
      MEDIA_ROOT: "/app/uploads" # mesma pasta que o volume
    command: bash -c 'while !</dev/tcp/db/5432; do sleep 1; done; python manage.py makemigrations &&  python manage.py migrate && python manage.py runserver 0.0.0.0:8000'
    volumes:
      - .:/app
      - uploads_data:/app/uploads # pasta de uploads compartilhada
    stdin_open: true
    tty: true
    ports:
      - "${WEB_PORT:-8085}:8000"
    depends_on:
      - db
    networks:
      - pandora_net

volumes:
  db_data:
  uploads_data:
networks:
  pandora_net:
    driver: bridge
    external: true
